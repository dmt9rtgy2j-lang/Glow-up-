<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GlowUp AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>✨ GlowUp AI ✨</h1>
    <p class="subtitle">Your daily confidence companion</p>

    <h3>How are you feeling today?</h3>

    <div class="buttons">
      <button onclick="getResponse('happy')">😊 Happy</button>
      <button onclick="getResponse('stressed')">😤 Stressed</button>
      <button onclick="getResponse('low')">😔 Low</button>
      <button onclick="getResponse('confident')">💅 Confident</button>
    </div>

    <div id="output" class="output"></div>

    <button class="vibe-btn" onclick="getVibe()">✨ Give me a vibe</button>
    <div id="vibeOutput" class="output"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
